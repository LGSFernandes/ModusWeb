spring.application.name=ModusWeb

# Datasource PostgreSQL:
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/modusweb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate:
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway Migrations:
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true

# Upload de Arquivos:
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# Diretório de upload:
app.upload.dir=${UPLOAD_DIR:uploads}
app.base-url=${BASE_URL:http://localhost:8080}

# Cache:
spring.cache.type=jcache
spring.cache.jcache.config=classpath:ehcache.xml

# Thymeleaf:
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# E-mail:
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:seu-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:sua-senha-de-app}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Servidor:
server.port=${PORT:8080}
server.error.whitelabel.enabled=false
server.compression.enabled=true

# Rate Limiting:
app.ratelimit.login.capacity=5
app.ratelimit.login.refill-seconds=60
app.ratelimit.global.capacity=100
app.ratelimit.global.refill-seconds=60

# Moderação de Conteúdo:
app.moderation.openai.api-key=${OPENAI_API_KEY:}
app.moderation.openai.enabled=${OPENAI_MODERATION_ENABLED:false}

# Logs de Auditoria:
logging.level.com.lfernandes.modusweb=INFO
logging.level.com.lfernandes.modusweb.audit=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator:
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
