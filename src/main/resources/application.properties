# ================================
#  ModusWeb - Application Config
# ================================

spring.application.name=ModusWeb

# Datasource PostgreSQL:
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/modusweb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate:
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Migrations:
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true

# Upload de Arquivos:
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# Diretório de upload:
app.upload.dir=${UPLOAD_DIR:uploads}
app.base-url=${BASE_URL:http://localhost:8080}

# Thymeleaf:
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# E-mail:
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:seu-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:sua-senha-de-app}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Servidor:
server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# Logs:
logging.level.com.lfernandes.modusweb=INFO
logging.level.org.springframework.security=WARN
